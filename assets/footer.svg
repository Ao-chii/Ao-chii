<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ft">
  <title id="ft">未完待续 TO BE CONTINUED</title>

  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="3.4" cy="3.4" r="2.2" fill="#f2f2f2" />
    </pattern>
    <filter id="hs" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="7" dy="7" stdDeviation="0" flood-color="#5c0000" flood-opacity="1" />
    </filter>
  </defs>

  <!-- 黑底斜块 -->
  <polygon points="0,14 1200,0 1200,206 0,220" fill="#0a0a0a" />
  <!-- 半调网点 + 斜线 -->
  <rect x="820" y="16" width="430" height="200" fill="url(#dots)" opacity="0.16" transform="skewX(-10)" />
  <path d="M-40 70L300 -30 M860 252L1190 -18" stroke="#f2f2f2" stroke-width="8" opacity="0.12" />
  <!-- 横贯红带 -->
  <polygon points="0,150 1200,120 1200,152 0,182" fill="#e60012" />
  <polygon points="0,182 1200,152 1200,160 0,190" fill="#5c0000" />

  <!-- 选中箭头（脉冲） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;8,0;0,0" dur="1.6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
    <polygon points="44,66 44,116 86,91" fill="#e60012" />
  </g>

  <!-- 大白星（脉冲） -->
  <g transform="translate(1004,92)">
    <g>
      <animateTransform attributeName="transform" attributeType="XML" type="scale"
        values="0.9;1.1;0.9" dur="2.6s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
      <polygon points="0,-40 6.4,-15.5 28.3,-28.3 15.5,-6.4 40,0 15.5,6.4 28.3,28.3 6.4,15.5 0,40 -6.4,15.5 -28.3,28.3 -15.5,6.4 -40,0 -15.5,-6.4 -28.3,-28.3 -6.4,-15.5" fill="#f2f2f2" />
    </g>
  </g>
  <!-- 小红星（错相脉冲） -->
  <g transform="translate(1116,150)">
    <g>
      <animateTransform attributeName="transform" attributeType="XML" type="scale"
        values="0.5;0.66;0.5" dur="3.4s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
      <polygon points="0,-40 6.4,-15.5 28.3,-28.3 15.5,-6.4 40,0 15.5,6.4 28.3,28.3 6.4,15.5 0,40 -6.4,15.5 -28.3,28.3 -15.5,6.4 -40,0 -15.5,-6.4 -28.3,-28.3 -6.4,-15.5" fill="#e60012" />
    </g>
  </g>

  <!-- 主文字（从下弹入带回弹） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,82;0,-8;0,0" keyTimes="0;0.82;1" dur="0.75s"
      calcMode="spline" keySplines="0.12 0.82 0.2 1;0.5 0 0.3 1" fill="freeze" />
    <text x="106" y="122" fill="#f2f2f2" filter="url(#hs)" font-family="'PingFang SC','Microsoft YaHei','Source Han Sans SC','Noto Sans CJK SC',sans-serif" font-size="66" font-weight="800" letter-spacing="6">未完待续</text>
    <text x="112" y="172" fill="#ffd400" font-family="'Arial Black',Impact,sans-serif" font-size="26" font-weight="900" letter-spacing="3">TO BE CONTINUED...
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- 右下签名 -->
  <text x="1168" y="202" text-anchor="end" fill="#7b7b7b" font-family="'Arial Black',Impact,sans-serif" font-size="15" font-weight="900" letter-spacing="2">BUILT CLEAN · SHIPPED QUIET</text>

  <!-- 底部红收边 -->
  <rect x="0" y="212" width="1200" height="8" fill="#e60012" />
</svg>
