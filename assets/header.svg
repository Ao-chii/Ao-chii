<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">AO-CHII</title>
  <desc id="d">红黑白 Persona 5 风格个人主页头图</desc>

  <defs>
    <!-- 半调网点 -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="3.4" cy="3.4" r="2.2" fill="#f2f2f2" />
    </pattern>
    <!-- P5 硬阴影（无模糊，暗红偏移） -->
    <filter id="hs" x="-20%" y="-20%" width="140%" height="155%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#5c0000" flood-opacity="1" />
    </filter>
    <filter id="hs2" x="-20%" y="-20%" width="140%" height="155%">
      <feDropShadow dx="6" dy="6" stdDeviation="0" flood-color="#0a0a0a" flood-opacity="1" />
    </filter>
    <style>
      .p5-heavy {
        font-family: 'Arial Black', Impact, 'Franklin Gothic Heavy', sans-serif;
        font-weight: 900;
        font-style: italic;
      }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="360" fill="#0a0a0a" />

  <!-- 左侧红色撕裂块（从左滑入） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="-360,0;0,0" keyTimes="0;1" dur="0.45s"
      calcMode="spline" keySplines="0.15 0.8 0.25 1" fill="freeze" />
    <polygon points="-60,0 430,0 402,52 440,104 396,156 434,208 390,260 428,312 310,360 -60,360" fill="#e60012" />
  </g>
  <!-- 左块右缘的暗红第二层撕裂 -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="-360,0;0,0" keyTimes="0;1" dur="0.55s"
      calcMode="spline" keySplines="0.15 0.8 0.25 1" fill="freeze" />
    <polygon points="418,0 512,0 392,360 300,360" fill="#8a0a14" />
  </g>

  <!-- 右侧红色撕裂块（从右滑入） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="360,0;0,0" keyTimes="0;1" dur="0.45s"
      calcMode="spline" keySplines="0.15 0.8 0.25 1" fill="freeze" />
    <polygon points="820,0 1260,0 1260,360 700,360 736,312 714,260 751,208 729,156 786,104 764,52" fill="#e60012" />
  </g>
  <!-- 最右暗角 -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="360,0;0,0" keyTimes="0;1" dur="0.55s"
      calcMode="spline" keySplines="0.15 0.8 0.25 1" fill="freeze" />
    <polygon points="1066,0 1260,0 1260,360 986,360" fill="#8a0a14" opacity="0.55" />
  </g>

  <!-- 半调网点 + 斜装饰线 -->
  <rect x="864" y="112" width="360" height="168" fill="url(#dots)" opacity="0.2" transform="skewX(-12)" />
  <path d="M-40 250L360 -30 M150 380L470 -10" stroke="#f2f2f2" stroke-width="9" opacity="0.15" />
  <path d="M812 384L1120 -24" stroke="#f2f2f2" stroke-width="9" opacity="0.13" />

  <!-- 爆炸星（红，右下角点缀，错相脉冲） -->
  <g transform="translate(1186,256)">
    <g>
      <animateTransform attributeName="transform" attributeType="XML" type="scale"
        values="0.55;0.72;0.55" dur="3.4s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
      <polygon points="0,-40 6.4,-15.5 28.3,-28.3 15.5,-6.4 40,0 15.5,6.4 28.3,28.3 6.4,15.5 0,40 -6.4,15.5 -28.3,28.3 -15.5,6.4 -40,0 -15.5,-6.4 -28.3,-28.3 -6.4,-15.5" fill="#e60012" />
    </g>
  </g>

  <!-- 主标签 AO-CHII（白底黑字，从左砸入带回弹） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="-900,0;16,0;0,0" keyTimes="0;0.82;1" dur="0.8s"
      calcMode="spline" keySplines="0.12 0.82 0.2 1;0.5 0 0.3 1" fill="freeze" />
    <polygon points="68,54 566,36 548,158 50,178" fill="#f2f2f2" filter="url(#hs)" />
    <g transform="rotate(-2.3 306 110)">
      <text x="104" y="140" fill="#e60012" class="p5-heavy" font-size="84" letter-spacing="2">AO-CHII</text>
      <path d="M102 151L480 151" stroke="#e60012" stroke-width="8" stroke-linecap="square" />
      <text x="94" y="132" fill="#0a0a0a" class="p5-heavy" font-size="84" letter-spacing="2">AO-CHII</text>
    </g>
  </g>

  <!-- 身份条（红底白字，从左滑入） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="-900,0;0,0" keyTimes="0;1" dur="0.85s"
      calcMode="spline" keySplines="0.16 0.78 0.24 1" fill="freeze" />
    <polygon points="58,214 706,194 690,272 42,292" fill="#e60012" filter="url(#hs2)" />
    <g transform="rotate(-1.8 374 242)">
      <text x="84" y="262" fill="#0a0a0a" class="p5-heavy" font-size="27" letter-spacing="1" opacity="0.42">MODELS / VISION / AGENTS / TOOLS</text>
      <text x="78" y="258" fill="#f2f2f2" class="p5-heavy" font-size="27" letter-spacing="1">MODELS / VISION / AGENTS / TOOLS</text>
    </g>
  </g>

  <!-- 右侧 SE ╳ AI 复合牌 -->
  <!-- SE 块（白底黑字，从上砸入带回弹） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,-340;0,14;0,0" keyTimes="0;0.82;1" dur="0.7s"
      calcMode="spline" keySplines="0.12 0.82 0.2 1;0.5 0 0.3 1" fill="freeze" />
    <polygon points="770,90 948,80 936,166 758,176" fill="#f2f2f2" filter="url(#hs)" />
    <g transform="rotate(-3.1 854 128)">
      <text x="796" y="157" fill="#e60012" class="p5-heavy" font-size="56" letter-spacing="2">SE</text>
      <text x="788" y="152" fill="#0a0a0a" class="p5-heavy" font-size="56" letter-spacing="2">SE</text>
    </g>
  </g>
  <!-- AI 块（黑底白字白边，从右弹入） -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="360,0;0,0" keyTimes="0;1" dur="0.95s"
      calcMode="spline" keySplines="0.16 0.78 0.24 1" fill="freeze" />
    <polygon points="968,80 1152,70 1140,156 956,166" fill="#0a0a0a" stroke="#f2f2f2" stroke-width="4" filter="url(#hs)" />
    <g transform="rotate(-3.1 1054 118)">
      <text x="1014" y="148" fill="#e60012" class="p5-heavy" font-size="56" letter-spacing="2">AI</text>
      <text x="1006" y="142" fill="#f2f2f2" class="p5-heavy" font-size="56" letter-spacing="2">AI</text>
    </g>
  </g>
  <!-- 红星 ╳ 连接符（咬住接缝，撞击炸开） -->
  <g opacity="0">
    <animate attributeName="opacity" to="1" begin="0.5s" dur="0.01s" fill="freeze" />
    <g transform="translate(958,123)">
      <g>
        <animateTransform attributeName="transform" attributeType="XML" type="scale"
          values="0;1.22;0.92;1" keyTimes="0;0.6;0.82;1" dur="0.5s" begin="0.5s"
          calcMode="spline" keySplines="0.2 0.9 0.3 1;0.5 0 0.5 1;0.5 0 0.5 1" fill="freeze" />
        <polygon points="0,-52 8.3,-20.2 36.8,-36.8 20.2,-8.3 52,0 20.2,8.3 36.8,36.8 8.3,20.2 0,52 -8.3,20.2 -36.8,36.8 -20.2,8.3 -52,0 -20.2,-8.3 -36.8,-36.8 -8.3,-20.2" fill="#e60012" stroke="#f2f2f2" stroke-width="5" />
        <line x1="-22" y1="-22" x2="22" y2="22" stroke="#f2f2f2" stroke-width="14" stroke-linecap="round" />
        <line x1="-22" y1="22" x2="22" y2="-22" stroke="#f2f2f2" stroke-width="14" stroke-linecap="round" />
      </g>
    </g>
  </g>

  <!-- 扫描线（循环上下移动） -->
  <rect x="0" y="-4" width="1200" height="2.5" fill="#f2f2f2" opacity="0.2">
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,366;0,0" dur="7s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
  </rect>

  <!-- 底部收边 -->
  <rect x="0" y="338" width="1200" height="22" fill="#f2f2f2" />
  <polygon points="0,338 470,338 438,360 0,360" fill="#e60012" />
  <polygon points="940,338 1200,338 1200,360 908,360" fill="#8a0a14" />
</svg>
