<svg width="980" height="260" viewBox="0 0 980 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
    <title id="title">AO-CHII profile dashboard</title>
    <desc id="desc">Self-generated GitHub profile statistics and language distribution.</desc>
    <style>text{font-family:'Arial Black',Impact,'Franklin Gothic Heavy',sans-serif;font-weight:900;font-style:italic}</style>
    <rect width="980" height="260" fill="#0a0a0a" />
    <polygon points="0,0 424,0 364,72 0,88" fill="#e60012" />
    <polygon points="760,0 980,0 980,260 684,260" fill="#8a0a14" opacity="0.7" />
    <path d="M-30 220L220 -20M728 292L1014 -22" stroke="#f2f2f2" stroke-width="10" opacity="0.11" />

    <!-- 中缝撕裂带（干净一条，红高光 + 暗红边） -->
    <polygon points="458,0 530,0 454,260 382,260" fill="#0a0a0a" />
    <polygon points="458,0 472,0 396,260 382,260" fill="#e60012" />
    <polygon points="514,0 530,0 454,260 438,260" fill="#8a0a14" opacity="0.9" />

    <!-- 标题（白色单层 + 斜切，两侧一致） -->
    <g transform="skewX(-8)">
      <text x="38" y="45" fill="#f2f2f2" font-size="26">PROFILE DOSSIER</text>
      <text x="518" y="45" fill="#f2f2f2" font-size="26">LANGUAGE MIX</text>
    </g>

    <!-- 左：数据块 -->
    <g transform="translate(34,82)">
      <polygon points="0,0 162,-5 154,49 -8,55" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <text x="12" y="18" fill="#7b7b7b" font-size="11">REPOS</text>
      <text x="12" y="43" fill="#f2f2f2" font-size="25">10</text>
    </g>
    <g transform="translate(219,82)">
      <polygon points="0,0 162,-5 154,49 -8,55" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <text x="12" y="18" fill="#7b7b7b" font-size="11">ACTIVE 12M</text>
      <text x="12" y="43" fill="#f2f2f2" font-size="25">9</text>
    </g>
    <g transform="translate(34,150)">
      <polygon points="0,0 162,-5 154,49 -8,55" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <text x="12" y="18" fill="#7b7b7b" font-size="11">STARS</text>
      <text x="12" y="43" fill="#f2f2f2" font-size="25">3</text>
    </g>
    <g transform="translate(219,150)">
      <polygon points="0,0 162,-5 154,49 -8,55" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <text x="12" y="18" fill="#7b7b7b" font-size="11">TOP LANG</text>
      <text x="12" y="43" fill="#f2f2f2" font-size="25">PYTHON</text>
    </g>

    <!-- 右：语言占比条 -->
    <rect x="506" y="88" width="420" height="18" fill="#111111" stroke="#8a0a14" stroke-width="2" />
    <rect x="506.0" y="88" width="230.8" height="18" fill="#e60012" /><rect x="736.8" y="88" width="134.6" height="18" fill="#f2f2f2" /><rect x="871.4" y="88" width="37.6" height="18" fill="#8a0a14" /><rect x="909.0" y="88" width="15.4" height="18" fill="#7b7b7b" /><rect x="924.4" y="88" width="1.6" height="18" fill="#ff5555" />

    <!-- 右：语言 chips -->
    <g transform="translate(506,120)">
      <polygon points="0,0 420,-6 412,32 -8,38" fill="#151515" stroke="#8a0a14" stroke-width="2" />
      <rect x="14" y="10" width="13" height="13" fill="#e60012" stroke="#e60012" stroke-width="1.5" />
      <text x="38" y="24" fill="#f2f2f2" font-size="19">PYTHON</text>
      <text x="400" y="24" fill="#7b7b7b" font-size="16" text-anchor="end">55.0%</text>
    </g>
    <g transform="translate(506,166)">
      <polygon points="0,0 202,-6 194,32 -8,38" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <rect x="14" y="9" width="10" height="10" fill="#f2f2f2" stroke="#7b7b7b" stroke-width="1.5" />
      <text x="31" y="21" fill="#f2f2f2" font-size="13">VUE</text>
      <text x="182" y="21" fill="#7b7b7b" font-size="12" text-anchor="end">32.0%</text>
    </g>
    <g transform="translate(721,166)">
      <polygon points="0,0 202,-6 194,32 -8,38" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <rect x="14" y="9" width="10" height="10" fill="#8a0a14" stroke="#8a0a14" stroke-width="1.5" />
      <text x="31" y="21" fill="#f2f2f2" font-size="13">JAVA</text>
      <text x="182" y="21" fill="#7b7b7b" font-size="12" text-anchor="end">9.0%</text>
    </g>
    <g transform="translate(506,208)">
      <polygon points="0,0 202,-6 194,32 -8,38" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <rect x="14" y="9" width="10" height="10" fill="#7b7b7b" stroke="#7b7b7b" stroke-width="1.5" />
      <text x="31" y="21" fill="#f2f2f2" font-size="13">TS</text>
      <text x="182" y="21" fill="#7b7b7b" font-size="12" text-anchor="end">3.7%</text>
    </g>
    <g transform="translate(721,208)">
      <polygon points="0,0 202,-6 194,32 -8,38" fill="#111111" stroke="#8a0a14" stroke-width="2" />
      <rect x="14" y="9" width="10" height="10" fill="#ff5555" stroke="#ff5555" stroke-width="1.5" />
      <text x="31" y="21" fill="#f2f2f2" font-size="13">OTHER</text>
      <text x="182" y="21" fill="#7b7b7b" font-size="12" text-anchor="end">0.4%</text>
    </g>

    <!-- 中缝红星 ╳ 徽章（压最上，呼应头图，轻脉冲） -->
    <g transform="translate(456,130)">
      <g>
        <animateTransform attributeName="transform" attributeType="XML" type="scale" values="0.95;1.05;0.95" dur="3.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
        <polygon points="0,-38 6.1,-14.7 26.9,-26.9 14.7,-6.1 38,0 14.7,6.1 26.9,26.9 6.1,14.7 0,38 -6.1,14.7 -26.9,26.9 -14.7,6.1 -38,0 -14.7,-6.1 -26.9,-26.9 -6.1,-14.7" fill="#e60012" stroke="#f2f2f2" stroke-width="4" />
        <line x1="-15" y1="-15" x2="15" y2="15" stroke="#f2f2f2" stroke-width="10" stroke-linecap="round" />
        <line x1="-15" y1="15" x2="15" y2="-15" stroke="#f2f2f2" stroke-width="10" stroke-linecap="round" />
      </g>
    </g>
</svg>
