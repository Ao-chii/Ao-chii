name: Generate Snake

on:
  # 每 12 小时刷新一次（UTC，避开整点）
  schedule:
    - cron: "23 */12 * * *"
  # 支持手动触发
  workflow_dispatch:
  # 推到 main 时也生成一次
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 生成贪吃蛇 SVG（P5 红黑配色），输出到 dist/
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#e60012&color_dots=#ebedf0,#ffc7cc,#ff5566,#e60012,#8a0a14
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#e60012&color_dots=#161b22,#5c0000,#990011,#e60012,#ff5566

      # 生成自有统计卡片，避免第三方 stats 服务 503 或统计口径不透明
      - name: Generate profile stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_OWNER: ${{ github.repository_owner }}
        run: |
          node .github/scripts/generate-profile-stats.js

      # 推到 output 分支供 README 引用
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
